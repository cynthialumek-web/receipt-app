<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Receipt App</title>
  <link rel="manifest" href="manifest.json">

  <!-- Searchable dropdown -->
  <link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">

  <style>
    body { font-family: sans-serif; padding: 16px; max-width: 500px; margin:auto;}
    h2 { margin-bottom: 5px; }
    select, input, button { width: 100%; padding: 10px; margin: 6px 0; }
    .item { display: flex; gap: 6px; }
    .item select { flex: 2; }
    .item input { flex: 1; }
    button { background:#000; color:#fff; border:none; }
    #receiptPreview { display:none; }
  </style>
</head>

<body>

<h2>New Receipt</h2>

<select id="client"></select>

<div id="items"></div>

<button onclick="addItem()">+ Add Item</button>

<h3 id="total">Total: $0.00</h3>
  
<button onclick="saveReceipt()">Save</button>
<button onclick="downloadPDF()">Download PDF</button>

<hr>

<button onclick="syncData()">🔄 Sync from Google Sheets</button>
<button onclick="exportData()">⬇️ Backup</button>
<input type="file" onchange="importData(event)">

<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script src="app.js"></script>

</body>
</html>
